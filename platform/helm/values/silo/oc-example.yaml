# Reference values — OpenCrane SILO instance "example" (S6 / ADR 0002).
#
# A silo is ONE release per ClusterTenant, on shared nodes. It renders the per-CT stack
# (operator + Obot/MCP gateway + skill-registry + Cognee + LiteLLM + a per-CT
# control-plane API + per-CT networking + a per-CT tenant DB) and renders NO central
# super-admin control-plane role and NO Zitadel — those live in the CENTRAL release
# (`opencrane-system`, the chart's default `deploymentRole: central`).
#
# A silo IS a `multiInstance` instance MINUS the central control-plane role MINUS Zitadel,
# so this profile also turns multiInstance on (namespaced RBAC + fail-closed watch).
#
# Install (CRDs are installed ONCE cluster-wide first — see docs/multi-instance.md; the
# CloudNativePG operator must also be installed cluster-wide as a singleton prerequisite):
#   kubectl apply -f platform/helm/crds/
#   helm install oc-example platform/helm -n oc-example --create-namespace --skip-crds \
#     -f platform/helm/values/silo/oc-example.yaml
#
# Validate statically:
#   helm template platform/helm -f platform/helm/values/silo/oc-example.yaml

# -- THE role switch. This is what makes the release a silo rather than the central plane.
deploymentRole: silo

multiInstance:
  enabled: true
  # This silo owns exactly its own namespace; namespaced RBAC + the cross-instance
  # default-deny NetworkPolicy are rendered for it.
  instanceNamespaces: [oc-example]
  rbac: namespaced
  # Fail closed: the operator refuses to start if WATCH_NAMESPACE is empty, so it can
  # never reconcile another silo's Tenants.
  requireWatchNamespace: true
  # Per-silo cert Issuer + SecretStore (no shared cluster-singleton).
  certIssuer: namespaced
  secretStore: namespaced

operator:
  # Scope the watch to this silo's namespace only.
  watchNamespace: oc-example

# -- Per-CT tenant DB: deploy-silo.sh provisions a dedicated CNPG cluster in THIS silo's
#    namespace (one Postgres per silo, serving its control-plane + planes) and wires the
#    control-plane to it via controlPlane.database.existingSecret. Nothing to set here.

ingress:
  domain: example.opencrane.local
