{{- /* Render the release-local Obot Deployment only when enabled AND instance-scoped.
       When sharedPlatform.mcpGateway.mode=shared the operator points tenants at an
       external Obot (opencrane.mcpGatewayUrl), so no in-release workload is created. */ -}}
{{- if and .Values.mcpGateway.enabled (ne (include "opencrane.mcpGatewayShared" .) "true") }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "opencrane.fullname" . }}-mcp-gateway
  labels:
    {{- include "opencrane.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcp-gateway
spec:
  replicas: {{ .Values.mcpGateway.replicas }}
  selector:
    matchLabels:
      {{- include "opencrane.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: mcp-gateway
  template:
    metadata:
      labels:
        {{- include "opencrane.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: mcp-gateway
    spec:
      serviceAccountName: {{ include "opencrane.fullname" . }}-mcp-gateway
      automountServiceAccountToken: true
      securityContext:
        {{- toYaml .Values.mcpGateway.podSecurityContext | nindent 8 }}
      containers:
        - name: mcp-gateway
          image: "{{ .Values.mcpGateway.image.repository }}:{{ .Values.mcpGateway.image.tag }}"
          imagePullPolicy: {{ .Values.mcpGateway.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.mcpGateway.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.mcpGateway.service.port }}
          env:
            # Database — Obot requires a PostgreSQL DSN. Provide via the per-instance,
            # release-prefixed `<fullname>-obot` Secret (B5: a fixed `opencrane-obot`
            # name would collide across instances in one cluster). Provisioned
            # out-of-band (operator/installer), not by this chart.
            - name: OBOT_SERVER_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ include "opencrane.obotSecretName" . }}
                  key: dsn
            # Hostname — used by Obot for OAuth callbacks; set to the in-cluster service URL.
            - name: OBOT_SERVER_HOSTNAME
              value: "http://{{ include "opencrane.fullname" . }}-mcp-gateway.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.mcpGateway.service.port }}"
            # Disable authentication — Obot is in-cluster only; access is controlled by NetworkPolicy.
            - name: OBOT_SERVER_ENABLE_AUTHENTICATION
              value: "false"
            # MCP runtime backend — run MCP server containers as Kubernetes pods.
            - name: OBOT_SERVER_MCPRUNTIME_BACKEND
              value: "kubernetes"
            - name: OBOT_SERVER_MCPCLUSTER_DOMAIN
              value: "cluster.local"
            - name: OBOT_SERVER_MCPNAMESPACE
              value: "{{ .Release.Namespace }}"
            - name: OBOT_SERVER_SERVICE_NAME
              value: "{{ include "opencrane.fullname" . }}-mcp-gateway"
            - name: OBOT_SERVER_SERVICE_NAMESPACE
              value: "{{ .Release.Namespace }}"
            - name: OBOT_SERVER_SERVICE_ACCOUNT_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.serviceAccountName
            {{- if .Values.mcpGateway.encryptionAtRest.enabled }}
            # Encryption-at-rest (P4D.1), gated behind mcpGateway.encryptionAtRest.enabled (default OFF).
            # VERIFIED against obot v0.23.x source: `custom` is a valid OBOT_SERVER_ENCRYPTION_PROVIDER
            # value (alongside aws/gcp/azure/none) and OBOT_SERVER_DSN is correct.
            # INCOMPLETE: the obot binary does NOT read OBOT_SERVER_ENCRYPTION_KEY directly — `custom`
            # requires an apiserver-style EncryptionConfiguration file referenced by
            # OBOT_SERVER_ENCRYPTION_CONFIG_FILE, which the upstream Obot Helm chart materialises from
            # the key via an `encryptionsetup` init container (with Obot's exact encrypted-resource
            # list). That init container is NOT yet replicated here, so the vars below are necessary
            # but NOT sufficient — do not rely on encryption-at-rest until the init container lands
            # (follow-up).
            - name: OBOT_SERVER_ENCRYPTION_PROVIDER
              value: "custom"
            - name: OBOT_SERVER_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.mcpGateway.encryptionAtRest.secretName }}
                  key: {{ .Values.mcpGateway.encryptionAtRest.secretKey }}
            {{- else }}
            # No credential encryption at rest (baseline; P4D.1 default OFF).
            - name: OBOT_SERVER_ENCRYPTION_PROVIDER
              value: "none"
            {{- end }}
            # MCP-catalog sync — KNOWN-SUSPECT, do not trust as-is (tracked follow-up). This points
            # Obot at the control-plane /api/internal/obot-registry endpoint, but research against obot
            # source indicates OBOT_SERVER_PROVIDER_REGISTRIES is for LLM model-provider *filesystem
            # directories*, NOT MCP server catalogs — the MCP catalog mechanism is
            # OBOT_SERVER_DEFAULT_MCPCATALOG_PATH (a GIT catalog URL). So this likely does NOT sync the
            # catalog, and Obot may hold no OpenCrane MCP servers (which would also block routing tenant
            # MCP through Obot). Left in place (the operator drift-repairer in apps/operator/src/
            # runtime-planes/drift-repairer.ts also enforces it) pending independent confirmation and a
            # coordinated fix across the deployment, drift-repairer + test, and this endpoint.
            - name: OBOT_SERVER_PROVIDER_REGISTRIES
              value: "http://{{ include "opencrane.fullname" . }}-control-plane:{{ .Values.controlPlane.service.port }}/api/internal/obot-registry"
          livenessProbe:
            httpGet:
              path: /api/healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 4
          readinessProbe:
            httpGet:
              path: /api/healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.mcpGateway.resources | nindent 12 }}
{{- end }}
