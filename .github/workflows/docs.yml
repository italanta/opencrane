name: Deploy docs site

# Builds the VitePress documentation site (website/) and deploys it to GitHub
# Pages. The interactive API reference is generated from the committed, drift-gated
# apps/control-plane/openapi.json (synced by the site's prebuild step), so this
# workflow needs no database or Prisma generation.

on:
  push:
    branches:
      - main
    paths:
      - "website/**"
      - "apps/control-plane/openapi.json"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# Allow one concurrent deployment; let in-progress runs finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    # pages:write + id-token:write let configure-pages enable Pages on first run.
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Enable Pages (source = GitHub Actions) automatically on first run,
          # so no manual Settings toggle is needed.
          enablement: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        env:
          # Project pages serve under /<repo>/ (e.g. /opencrane/). VitePress needs
          # this base at build time so asset and link URLs resolve. Derived from the
          # repo name, so it keeps working if the repo is renamed. For a custom
          # domain, drop this env (and add public/CNAME) so base stays '/'.
          DOCS_BASE: /${{ github.event.repository.name }}/
        run: pnpm docs:build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/.vitepress/dist

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
